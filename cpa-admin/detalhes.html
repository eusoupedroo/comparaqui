<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparaqui — Detalhes do mercado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/navigation.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="page-content">
        <main>
          <div class="page-inner">
            <header class="page-header">
              <span class="eyebrow">Mercado selecionado</span>
              <h1 class="page-title">Detalhes do mercado</h1>
              <p class="page-subtitle">Veja os produtos encontrados, indisponíveis e as sugestões de substituição específicas deste mercado.</p>
            </header>

            <section class="market-header" data-market-header></section>

            <div class="page-grid">
              <section class="page-main col-8">
                <article class="card" data-products-found></article>
                <article class="card" data-products-missing></article>
              </section>
              <section class="page-side col-4 side-panel review-side">
                <article class="card" data-market-suggestions></article>
                <article class="total-economy-card" data-market-economy></article>
              </section>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="./scripts/detalhes.js"></script>
  </body>
</html>
